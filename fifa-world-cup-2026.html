<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026 — Schedule</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        trt: '#dc2626',
        live: '#16a34a',
      }
    }
  }
}
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@300;400;500;600;700&display=swap');
  body { font-family: 'Inter', sans-serif; }
  .font-serif { font-family: 'Playfair Display', serif; }
  .match-card { transition: box-shadow 0.2s; }
  .match-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .match-card.is-today { border-left: 4px solid #dc2626; }
  .match-card.is-live { border-left: 4px solid #16a34a; animation: pulse-border 2s infinite; }
  @keyframes pulse-border { 0%,100%{border-left-color:#16a34a} 50%{border-left-color:#bbf7d0} }
  select, input { font-family: 'Inter', sans-serif; }
  .trt-box { background: linear-gradient(135deg, #dc2626, #b91c1c); }
</style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

<div class="max-w-[1280px] mx-auto px-4 py-6" id="app">

  <!-- HEADER -->
  <header class="flex flex-wrap items-start justify-between gap-4 mb-6">
    <div>
      <p class="text-xs tracking-[0.2em] text-gray-500 font-semibold mb-1">CANADA · MEXICO · UNITED STATES · 11 JUN – 19 JUL 2026</p>
      <h1 class="font-serif text-4xl md:text-5xl font-bold">FIFA World Cup <span class="text-trt italic">26</span></h1>
      <p class="text-sm text-gray-600 mt-1">Every one of the 104 fixtures — shown in the <strong>venue's local time</strong> and always in <strong class="text-trt">Türkiye time (TRT)</strong>.</p>
    </div>
    <div class="flex gap-3 items-stretch">
      <div class="border rounded-lg px-4 py-2 text-center bg-white">
        <p class="text-[10px] tracking-wider text-gray-500 font-semibold">EUROPE/ISTANBUL</p>
        <p class="text-2xl font-bold tabular-nums" id="clock-local"></p>
        <p class="text-[10px] text-gray-400">your device</p>
      </div>
      <div class="trt-box rounded-lg px-4 py-2 text-center text-white">
        <p class="text-[10px] tracking-wider text-red-200 font-semibold">🇹🇷 TÜRKİYE · TRT</p>
        <p class="text-2xl font-bold tabular-nums" id="clock-trt"></p>
        <p class="text-[10px] text-red-200" id="countdown"></p>
      </div>
    </div>
  </header>

  <!-- FILTERS -->
  <div class="bg-white border rounded-xl p-4 mb-6">
    <div class="flex flex-wrap gap-3 items-end">
      <!-- View toggle -->
      <div class="flex rounded-full border overflow-hidden">
        <button id="btn-day" onclick="setView('day')" class="px-5 py-2 text-sm font-medium bg-gray-900 text-white">By Day</button>
        <button id="btn-phase" onclick="setView('groups')" class="px-5 py-2 text-sm font-medium text-gray-600 hover:bg-gray-100">By Groups</button>
        <button id="btn-knockout" onclick="setView('knockout')" class="px-5 py-2 text-sm font-medium text-gray-600 hover:bg-gray-100 border-l">By Knock Out</button>
      </div>

      <!-- Search -->
      <div id="searchWrap">
        <label class="text-[10px] tracking-wider text-gray-500 font-semibold block mb-1">SEARCH TEAM</label>
        <input id="search" type="text" list="teamOptions" autocomplete="off" placeholder="e.g. Türkiye, Brazil, Argentina…" class="border rounded-lg px-3 py-2 text-sm w-64" oninput="applyFilters()">
        <datalist id="teamOptions"></datalist>
      </div>

      <!-- Round selector (knockout view only) -->
      <div id="phaseWrap" style="display:none">
        <label class="text-[10px] tracking-wider text-gray-500 font-semibold block mb-1">ROUND</label>
        <select id="phaseSelect" class="border rounded-lg px-3 py-2 text-sm w-48" onchange="applyFilters()">
          <option value="">All rounds</option>
        </select>
      </div>

      <!-- Group selector (groups view only) -->
      <div id="groupWrap" style="display:none">
        <label class="text-[10px] tracking-wider text-gray-500 font-semibold block mb-1">GROUP</label>
        <select id="groupSelect" class="border rounded-lg px-3 py-2 text-sm w-32" onchange="applyFilters()">
          <option value="">All groups</option>
        </select>
      </div>

      <!-- Day selector -->
      <div id="dayWrap">
        <label class="text-[10px] tracking-wider text-gray-500 font-semibold block mb-1">JUMP TO DAY</label>
        <input id="daySelect" type="date" class="border rounded-lg px-3 py-2 text-sm w-48" onchange="applyFilters()">
      </div>

      <button onclick="clearFilters()" class="border px-5 py-2 rounded-full text-sm font-medium text-gray-600 hover:bg-gray-100">Clear</button>

      <label id="hidePlayedWrap" class="flex items-center gap-2 text-sm text-gray-600 cursor-pointer select-none">
        <input id="hidePlayed" type="checkbox" checked onchange="applyFilters()" class="w-4 h-4 accent-trt"> Hide finished matches
      </label>

      <div class="flex gap-5 ml-auto text-xs text-gray-500 items-center">
        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-trt inline-block"></span> Türkiye time</span>
        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-live inline-block"></span> Live now</span>
        <span id="matchCount" class="font-semibold text-gray-700"></span>
        <span id="scoreSync" class="text-xs text-gray-400"></span>
      </div>
    </div>
  </div>

  <!-- CONTENT -->
  <div id="content"></div>
</div>

<script>
// ============================
// DATA — venues/flags/groups/matches live in data.json (edit there)
// ============================
// Reference data loaded from data.json (see loadData)
let VENUES = {}, FLAGS = {}, GROUPS = {}, MATCHES = [];

// ============================
// SCORES — SEPARATE OVERLAY (keyed by match id)
// MATCHES array above stays untouched. Only results live here.
// status: "NS" not started | "LIVE" | "FT" full time.
// These hardcoded values are the FALLBACK shown instantly on load;
// loadScores() overwrites them from scores.json after paint.
// ============================
let SCORES = {
  1: {home:2, away:0, status:"FT"}, // Mexico 2-0 South Africa
  2: {home:2, away:1, status:"FT"}, // South Korea 2-1 Czechia
  3: {home:1, away:1, status:"FT"}, // Canada 1-1 Bosnia and Herzegovina
  4: {home:4, away:1, status:"FT"}, // USA 4-1 Paraguay
  6: {home:1, away:1, status:"FT"}, // Brazil 1-1 Morocco
  // id5 Qatar v Switzerland — not yet in API; fills when available
};

function getScore(m) { return SCORES[m.id] || null; }

// ============================
// HELPERS
// ============================
const TRT = "Europe/Istanbul";
const PHASE_LABELS = {group:"Group Stage",round32:"Round of 32",round16:"Round of 16",quarter:"Quarter-finals",semi:"Semi-finals",third:"Third Place Play-off",final:"Final"};
const PHASE_ORDER = ["group","round32","round16","quarter","semi","third","final"];
const DAYS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function fmt(date, tz, style="time") {
  const d = new Date(date);
  if (style === "time") {
    return d.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",timeZone:tz});
  }
  if (style === "date") {
    return d.toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short",timeZone:tz});
  }
  if (style === "datekey") {
    return d.toLocaleDateString("en-CA",{timeZone:tz}); // YYYY-MM-DD
  }
}

function trtDate(utc) { return fmt(utc, TRT, "date"); }
function trtTime(utc) { return fmt(utc, TRT, "time"); }
function localTime(utc, city) { return fmt(utc, VENUES[city].tz, "time"); }
function localDate(utc, city) { return fmt(utc, VENUES[city].tz, "date"); }
function localDateKey(utc, city) { return fmt(utc, VENUES[city].tz, "datekey"); }

function flag(team) { return FLAGS[team] || "🏳️"; }

function isToday(utc, tz) {
  const now = new Date();
  return fmt(now, tz, "datekey") === fmt(utc, tz, "datekey");
}

function isLive(utc) {
  const start = new Date(utc).getTime();
  const now = Date.now();
  return now >= start && now <= start + 120*60*1000; // ~2h match
}

function isUpcoming(utc) {
  return new Date(utc).getTime() > Date.now();
}

function allTeamsSorted() {
  const s = new Set();
  MATCHES.forEach(m => { if(FLAGS[m.home]) s.add(m.home); if(FLAGS[m.away]) s.add(m.away); });
  return [...s].sort();
}

function allDaysSorted() {
  const s = new Set();
  MATCHES.forEach(m => s.add(localDateKey(m.utc, m.city)));
  return [...s].sort();
}

// A match is "finished" ~2h after kick-off
function isPlayed(utc) {
  return Date.now() > new Date(utc).getTime() + 120*60*1000;
}

// ============================
// STATE
// ============================
let state = { view: "day" };

function getFilters() {
  return {
    search: document.getElementById("search").value.toLowerCase().trim(),
    phase: document.getElementById("phaseSelect").value,
    group: document.getElementById("groupSelect").value,
    day: document.getElementById("daySelect").value,
    hidePlayed: document.getElementById("hidePlayed").checked,
  };
}

function filterMatches() {
  const f = getFilters();
  // Groups view: only group stage, filtered by selected group. No search/day/hide-finished.
  if (state.view === "groups") {
    return MATCHES.filter(m => m.phase === "group" && (!f.group || m.group === f.group));
  }
  // Knockout view: only knockout rounds, filtered by selected round. No search/day/hide-finished.
  if (state.view === "knockout") {
    return MATCHES.filter(m => m.phase !== "group" && (!f.phase || m.phase === f.phase));
  }
  return MATCHES.filter(m => {
    if (f.search) {
      if (!m.home.toLowerCase().includes(f.search) && !m.away.toLowerCase().includes(f.search)) return false;
    }
    if (f.phase && m.phase !== f.phase) return false;
    if (f.group && m.group !== f.group) return false;
    if (f.day && localDateKey(m.utc, m.city) !== f.day) return false;
    if (f.hidePlayed && isPlayed(m.utc)) return false;
    return true;
  });
}

// ============================
// RENDER MATCH CARD
// ============================
function renderMatchCard(m) {
  const v = VENUES[m.city];
  const live = isLive(m.utc);
  const today = isToday(m.utc, TRT);

  // Find first upcoming match
  const nextMatch = MATCHES.filter(x => isUpcoming(x.utc)).sort((a,b) => new Date(a.utc)-new Date(b.utc))[0];
  const isNext = nextMatch && m.id === nextMatch.id;

  let cardClass = "match-card bg-white border rounded-xl p-4 md:p-5 flex flex-col md:flex-row gap-4 items-start md:items-center";
  if (live) cardClass += " is-live";
  else if (today) cardClass += " is-today";

  // Phase label
  let phaseLabel = "";
  if (m.phase === "group") {
    phaseLabel = `<span class="text-xs font-semibold tracking-wider text-gray-500">GROUP ${m.group} · MD${m.md}</span>`;
  } else {
    phaseLabel = `<span class="text-xs font-semibold tracking-wider text-gray-500">${PHASE_LABELS[m.phase].toUpperCase()} · M${m.id}</span>`;
  }

  // Badges
  let badge = "";
  if (live) badge = `<span class="inline-block bg-live text-white text-[10px] font-bold px-2 py-0.5 rounded mt-1">LIVE</span>`;
  else if (isNext) badge = `<span class="inline-block bg-gray-900 text-white text-[10px] font-bold px-2 py-0.5 rounded mt-1">UP NEXT</span>`;

  // Score overlay (from SCORES map; null if not played/recorded)
  const score = getScore(m);
  let homeScore = "", awayScore = "", homeWin = "", awayWin = "", ftBadge = "";
  if (score) {
    // Penalty shootout (level knockout): show the pen tally in parentheses,
    // e.g. 1 (4), and decide the winner by pens rather than the level score.
    const hasPens = (score.penHome != null && score.penAway != null);
    const penH = hasPens ? ` <span class="text-sm text-gray-500 font-semibold">(${score.penHome})</span>` : "";
    const penA = hasPens ? ` <span class="text-sm text-gray-500 font-semibold">(${score.penAway})</span>` : "";
    homeScore = `<span class="text-xl font-bold tabular-nums ml-auto pl-3">${score.home}${penH}</span>`;
    awayScore = `<span class="text-xl font-bold tabular-nums ml-auto pl-3">${score.away}${penA}</span>`;
    if (score.status === "FT") {
      const homeWon = (hasPens && score.home === score.away) ? score.penHome > score.penAway : score.home > score.away;
      const awayWon = (hasPens && score.home === score.away) ? score.penAway > score.penHome : score.away > score.home;
      if (homeWon) awayWin = "text-gray-400";
      else if (awayWon) homeWin = "text-gray-400";
      const ftLabel = hasPens ? "FT&nbsp;·&nbsp;PENS" : "FT";
      ftBadge = `<span class="inline-block bg-gray-200 text-gray-700 text-[10px] font-bold px-2 py-0.5 rounded mt-1">${ftLabel}</span>`;
    }
  }

  return `
  <div class="${cardClass}" id="match-${m.id}">
    <!-- Phase + Badge -->
    <div class="w-32 shrink-0">
      ${phaseLabel}
      <div>${badge}${ftBadge}</div>
    </div>

    <!-- Teams -->
    <div class="flex-1 min-w-[200px]">
      <div class="flex items-center gap-2 text-base font-medium ${homeWin}">
        <span class="text-xl">${flag(m.home)}</span>
        <span>${m.home}</span>
        ${homeScore}
      </div>
      <div class="text-xs text-gray-400 my-0.5 ml-8">v</div>
      <div class="flex items-center gap-2 text-base font-medium ${awayWin}">
        <span class="text-xl">${flag(m.away)}</span>
        <span>${m.away}</span>
        ${awayScore}
      </div>
    </div>

    <!-- Venue -->
    <div class="w-36 shrink-0 text-sm">
      <div class="font-semibold">${m.city}</div>
      <div class="text-gray-500 text-xs">${v.stadium}</div>
    </div>

    <!-- Times -->
    <div class="shrink-0 text-right">
      <div class="text-xs text-gray-500 font-semibold tracking-wider">${m.city.toUpperCase()} · LOCAL</div>
      <div class="text-2xl font-bold">${localTime(m.utc, m.city)} <span class="text-xs font-normal text-gray-400">${localDate(m.utc, m.city)}</span></div>
      <div class="trt-box text-white rounded-lg px-3 py-1.5 mt-1 inline-block min-w-[180px]">
        <div class="flex items-center justify-between gap-3">
          <span class="text-xs">🇹🇷 TÜRKİYE · TRT</span>
          <span class="text-xl font-bold">${trtTime(m.utc)}</span>
        </div>
        <div class="text-[10px] text-red-200">${trtDate(m.utc)}</div>
      </div>
    </div>
  </div>`;
}

// ============================
// DAY VIEW
// ============================
function renderDayView(matches) {
  // Group by local venue date
  const byDay = {};
  matches.forEach(m => {
    const key = localDateKey(m.utc, m.city);
    if (!byDay[key]) byDay[key] = [];
    byDay[key].push(m);
  });

  const sortedDays = Object.keys(byDay).sort();
  if (!sortedDays.length) {
    return `<div class="text-center text-gray-400 py-16 text-sm">No matches for this selection.</div>`;
  }
  let html = "";

  sortedDays.forEach(dayKey => {
    const dayMatches = byDay[dayKey].sort((a,b) => new Date(a.utc)-new Date(b.utc));
    const d = new Date(dayKey + "T12:00:00");
    const dayNum = d.getDate();
    const month = MONTHS[d.getMonth()];
    const weekday = DAYS[d.getDay()].toUpperCase();
    const todayClass = (new Date().toLocaleDateString("en-CA") === dayKey) ? "text-trt" : "text-gray-900";

    html += `
    <div class="flex gap-6 mb-8 day-section" data-date="${dayKey}">
      <!-- Date column -->
      <div class="w-28 shrink-0 text-center pt-4">
        <div class="font-serif italic text-5xl font-bold ${todayClass}">${dayNum}</div>
        <div class="font-serif italic text-lg ${todayClass}">${month}</div>
        <div class="text-[10px] tracking-wider font-semibold text-gray-500 mt-1">${weekday}</div>
        <div class="text-xs text-gray-400 mt-1">${dayMatches.length} match${dayMatches.length>1?"es":""}</div>
      </div>
      <!-- Matches -->
      <div class="flex-1 flex flex-col gap-3">
        ${dayMatches.map(m => renderMatchCard(m)).join("")}
      </div>
    </div>`;
  });

  return html;
}

// ============================
// PHASE VIEW
// ============================
function renderPhaseView(matches) {
  let html = "";

  // Group stage — by group
  const groupMatches = matches.filter(m => m.phase === "group");
  if (groupMatches.length) {
    html += `<h2 class="text-2xl font-bold mb-4 font-serif">Group Stage</h2>`;
    const groups = [...new Set(groupMatches.map(m => m.group))].sort();
    groups.forEach(g => {
      const gm = groupMatches.filter(m => m.group === g).sort((a,b) => new Date(a.utc)-new Date(b.utc));
      const teams = GROUPS[g] || [];
      html += `
      <div class="mb-8">
        <div class="flex items-center gap-3 mb-3">
          <h3 class="text-lg font-bold">Group ${g}</h3>
          <div class="flex gap-2 text-sm text-gray-600">
            ${teams.map(t => `<span class="bg-gray-100 rounded-full px-2 py-0.5">${flag(t)} ${t}</span>`).join("")}
          </div>
        </div>
        <div class="flex flex-col gap-3">
          ${gm.map(m => renderMatchCard(m)).join("")}
        </div>
      </div>`;
    });
  }

  // Knockout rounds
  PHASE_ORDER.slice(1).forEach(phase => {
    const pm = matches.filter(m => m.phase === phase).sort((a,b) => new Date(a.utc)-new Date(b.utc));
    if (!pm.length) return;
    html += `
    <h2 class="text-2xl font-bold mb-4 mt-10 font-serif">${PHASE_LABELS[phase]}</h2>
    <div class="flex flex-col gap-3 mb-8">
      ${pm.map(m => renderMatchCard(m)).join("")}
    </div>`;
  });

  return html;
}

// ============================
// MAIN RENDER
// ============================
function render() {
  const matches = filterMatches();
  document.getElementById("matchCount").textContent = `${matches.length} of ${MATCHES.length} matches`;

  const content = document.getElementById("content");
  if (state.view === "day") {
    content.innerHTML = renderDayView(matches);
  } else {
    content.innerHTML = renderPhaseView(matches);
  }
}

function applyFilters() { render(); }

function setView(v) {
  state.view = v;
  const day = v === "day", groups = v === "groups", knockout = v === "knockout";
  const on = "px-5 py-2 text-sm font-medium bg-gray-900 text-white";
  const off = "px-5 py-2 text-sm font-medium text-gray-600 hover:bg-gray-100";
  document.getElementById("btn-day").className = day ? on : off;
  document.getElementById("btn-phase").className = groups ? on : off;
  document.getElementById("btn-knockout").className = knockout ? on + " border-l" : off + " border-l";
  // Per-view controls: Day = search/day/hide-finished; Groups = group; Knockout = round.
  document.getElementById("searchWrap").style.display = day ? "" : "none";
  document.getElementById("dayWrap").style.display = day ? "" : "none";
  document.getElementById("hidePlayedWrap").style.display = day ? "" : "none";
  document.getElementById("groupWrap").style.display = groups ? "" : "none";
  document.getElementById("phaseWrap").style.display = knockout ? "" : "none";
  // Default selections
  const gs = document.getElementById("groupSelect");
  const ps = document.getElementById("phaseSelect");
  if (groups) { if (!gs.value) gs.value = gs.options[1] ? gs.options[1].value : ""; }
  else gs.value = "";
  if (knockout) { if (!ps.value) ps.value = ps.options[1] ? ps.options[1].value : ""; }
  else ps.value = "";
  render();
}

function clearFilters() {
  document.getElementById("search").value = "";
  document.getElementById("phaseSelect").value = "";
  document.getElementById("groupSelect").value = "";
  document.getElementById("daySelect").value = "";
  document.getElementById("hidePlayed").checked = true;
  render();
}


// ============================
// CLOCKS
// ============================
function updateClocks() {
  const now = new Date();
  document.getElementById("clock-local").textContent = now.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",second:"2-digit",timeZone:TRT});
  document.getElementById("clock-trt").textContent = now.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",second:"2-digit",timeZone:TRT});

  // Countdown to next match
  const next = MATCHES.filter(m => isUpcoming(m.utc)).sort((a,b) => new Date(a.utc)-new Date(b.utc))[0];
  if (next) {
    const diff = new Date(next.utc).getTime() - now.getTime();
    const days = Math.floor(diff / 86400000);
    const hrs = Math.floor((diff % 86400000) / 3600000);
    const mins = Math.floor((diff % 3600000) / 60000);
    const secs = Math.floor((diff % 60000) / 1000);
    let label = days > 0 ? `${days}d ${String(hrs).padStart(2,"0")}h ${String(mins).padStart(2,"0")}m` : `${String(hrs).padStart(2,"0")}h ${String(mins).padStart(2,"0")}m ${String(secs).padStart(2,"0")}s`;
    document.getElementById("countdown").textContent = `next kick-off: ${label}`;
  } else {
    document.getElementById("countdown").textContent = "tournament complete";
  }
}

// ============================
// SCORES — loaded from scores.json (updated by a separate process)
// Writes into SCORES overlay only; MATCHES untouched.
// scores.json shape: { "<matchId>": {home:Int, away:Int, status:"NS"|"LIVE"|"FT"
//                       [, penHome:Int, penAway:Int]}, ... }
// penHome/penAway present only for a knockout decided on penalties (level FT).
// ============================
const SCORES_URL = "scores.json";

function setSyncStatus(text) {
  const el = document.getElementById("scoreSync");
  if (el) el.innerHTML = text;
}

async function loadScores() {
  setSyncStatus(`<span class="inline-block animate-spin">↻</span> loading scores…`);
  try {
    const res = await fetch(SCORES_URL, { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    // Merge over hardcoded fallback (file wins where present)
    SCORES = Object.assign({}, SCORES, data);
    render();
    const liveCount = Object.values(data).filter(s => s && s.status === "LIVE").length;
    setSyncStatus(liveCount ? `🟢 ${liveCount} live` : `✓ scores updated`);
  } catch (err) {
    setSyncStatus(`⚠ scores offline (showing saved)`);
    console.warn("score load failed:", err);
  }
}

// ============================
// REFERENCE DATA — loaded from data.json (venues, flags, groups, matches)
// ============================
const DATA_URL = "data.json";

async function loadData() {
  const res = await fetch(DATA_URL, { cache: "no-store" });
  if (!res.ok) throw new Error("HTTP " + res.status);
  const d = await res.json();
  VENUES = d.venues || {};
  FLAGS  = d.flags  || {};
  GROUPS = d.groups || {};
  MATCHES = d.matches || [];
}

// ============================
// INIT
// ============================
async function init() {
  // Clocks can start immediately
  updateClocks();
  setInterval(updateClocks, 1000);

  // Reference data must load before first render
  try {
    await loadData();
  } catch (err) {
    document.getElementById("content").innerHTML =
      `<div class="text-center text-trt py-16 text-sm">Failed to load data.json — ${err.message}</div>`;
    console.error("data load failed:", err);
    return;
  }

  // Populate team autocomplete
  const teams = allTeamsSorted();
  const dl = document.getElementById("teamOptions");
  dl.innerHTML = teams.map(t => `<option value="${t}">${flag(t)} ${t}</option>`).join("");

  // Bound date picker to tournament range
  const days = allDaysSorted();
  const daySel = document.getElementById("daySelect");
  if (days.length) {
    daySel.min = days[0];
    daySel.max = days[days.length - 1];
  }

  // Populate phase dropdown (only phases present, in order)
  const phaseSel = document.getElementById("phaseSelect");
  const present = new Set(MATCHES.map(m => m.phase));
  phaseSel.innerHTML = `<option value="">All rounds</option>` +
    PHASE_ORDER.slice(1).filter(p => present.has(p))
      .map(p => `<option value="${p}">${PHASE_LABELS[p]}</option>`).join("");

  // Populate group dropdown (distinct groups, sorted)
  const groupSel = document.getElementById("groupSelect");
  const groups = [...new Set(MATCHES.map(m => m.group).filter(Boolean))].sort();
  groupSel.innerHTML = `<option value="">All groups</option>` +
    groups.map(g => `<option value="${g}">Group ${g}</option>`).join("");

  render();              // paint from data.json + hardcoded score fallback

  loadScores();          // async overwrite from scores.json (after paint)
  setInterval(loadScores, 60000); // re-read file every 60s for live matches
}

init();
</script>
</body>
</html>
